name: Convert Rules to SmartDNS

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rule sets
        run: |
          mkdir -p rules_raw
          curl -fsSL "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/sing/geo/geosite/cn.srs" \
            -o rules_raw/cn.srs
          curl -fsSL "https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/sing/geo/geosite/geolocation-!cn.srs" \
            -o rules_raw/foreign.srs

      - name: Convert srs to domain lists
        run: |
          mkdir -p smartdns

          cat > /tmp/parse_srs.py << 'PYEOF'
          import sys, re

          def parse_srs(filepath):
              with open(filepath, 'rb') as f:
                  data = f.read()
              domains = set()
              text = data.decode('latin-1')
              pattern = re.compile(r'(?<![.\w])((?:[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,})')
              for m in pattern.finditer(text):
                  d = m.group(1).lower().rstrip('.')
                  if '.' in d and len(d) > 3:
                      domains.add(d)
              return domains

          if __name__ == '__main__':
              for d in sorted(parse_srs(sys.argv[1])):
                  print(d)
          PYEOF

          python3 /tmp/parse_srs.py rules_raw/cn.srs | sort -u > smartdns/china-domains.txt
          echo "国内域名: $(wc -l < smartdns/china-domains.txt) 条"

          python3 /tmp/parse_srs.py rules_raw/foreign.srs | sort -u > smartdns/foreign-domains.txt
          echo "国外域名: $(wc -l < smartdns/foreign-domains.txt) 条"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add smartdns/
          git diff --cached --quiet || git commit -m "Auto update smartdns rules $(date -u '+%Y-%m-%d %H:%M')"
          git push
